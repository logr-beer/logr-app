name: logr
type: laravel
docroot: public
php_version: "8.4"
webserver_type: nginx-fpm
omit_containers: [db]
nodejs_version: "20"
corepack_enable: true
hooks:
  post-start:
    - exec-host: "docker exec -u root ddev-logr-web bash -c 'mkdir -p /data/database /data/storage && touch /data/database/database.sqlite && chmod 777 /data/database && chmod 666 /data/database/database.sqlite && chown -R www-data:www-data /data'"
    - exec: |
        # Symlink shared database and run migrations
        ln -sf /data/database/database.sqlite /var/www/html/database/database.sqlite
        php artisan migrate --force
web_extra_daemons:
  - name: queue-worker
    command: php artisan queue:listen --sleep=3 --tries=3 --timeout=300
    directory: /var/www/html
  - name: scheduler
    command: php artisan schedule:work
    directory: /var/www/html
