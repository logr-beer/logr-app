services:
  app:
    build: .
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      - db-data:/var/www/html/database
      - app-storage:/var/www/html/storage/app
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_CONNECTION=sqlite
      - DB_DATABASE=/var/www/html/database/database.sqlite
    restart: unless-stopped

  queue:
    build: .
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=300
    volumes:
      - db-data:/var/www/html/database
      - app-storage:/var/www/html/storage/app
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_CONNECTION=sqlite
      - DB_DATABASE=/var/www/html/database/database.sqlite
    restart: unless-stopped

volumes:
  db-data:
  app-storage:
